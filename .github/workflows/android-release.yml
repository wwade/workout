name: Android Release

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.event.release.id }}
  cancel-in-progress: false

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user

jobs:
  signed-apk:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate signing secrets
        env:
          WORKOUT_RELEASE_KEYSTORE_BASE64: ${{ secrets.WORKOUT_RELEASE_KEYSTORE_BASE64 }}
          WORKOUT_RELEASE_STORE_PASSWORD: ${{ secrets.WORKOUT_RELEASE_STORE_PASSWORD }}
          WORKOUT_RELEASE_KEY_ALIAS: ${{ secrets.WORKOUT_RELEASE_KEY_ALIAS }}
          WORKOUT_RELEASE_KEY_PASSWORD: ${{ secrets.WORKOUT_RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$WORKOUT_RELEASE_KEYSTORE_BASE64"
          test -n "$WORKOUT_RELEASE_STORE_PASSWORD"
          test -n "$WORKOUT_RELEASE_KEY_ALIAS"
          test -n "$WORKOUT_RELEASE_KEY_PASSWORD"

      - name: Decode release keystore
        env:
          WORKOUT_RELEASE_KEYSTORE_BASE64: ${{ secrets.WORKOUT_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$WORKOUT_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore/workout-release.jks"

      - name: Assemble release APK
        env:
          WORKOUT_RELEASE_STORE_FILE: ${{ runner.temp }}/keystore/workout-release.jks
          WORKOUT_RELEASE_STORE_PASSWORD: ${{ secrets.WORKOUT_RELEASE_STORE_PASSWORD }}
          WORKOUT_RELEASE_KEY_ALIAS: ${{ secrets.WORKOUT_RELEASE_KEY_ALIAS }}
          WORKOUT_RELEASE_KEY_PASSWORD: ${{ secrets.WORKOUT_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --warning-mode all

      - name: Prepare release asset
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          cp app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/release/workout-${{ github.event.release.tag_name }}.apk"

      - name: Upload signed APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/release/workout-${{ github.event.release.tag_name }}.apk
          fail_on_unmatched_files: true

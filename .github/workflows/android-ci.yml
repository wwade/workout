name: Android CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user

jobs:
  verify:
    name: Build, Test, and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --warning-mode all

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --warning-mode all

      - name: Run Android lint
        run: ./gradlew lintDebug --warning-mode all

  device-tests:
    name: Instrumentation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumentation tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 37
          arch: x86_64
          profile: pixel_6
          script: ./gradlew app:connectedDebugAndroidTest --warning-mode all --stacktrace

      - name: Upload instrumentation test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-test-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
            build/reports/problems/
          if-no-files-found: ignore
